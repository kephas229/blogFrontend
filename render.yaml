services:
  - type: web
    name: blog-frontend
    runtime: static
    region: frankfurt
    plan: free
    branch: main
    buildCommand: "npm ci && npm run build"
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
